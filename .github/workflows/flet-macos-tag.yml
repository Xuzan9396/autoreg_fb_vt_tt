---
# 这个工作流用于在推送 tag 时自动构建 AutoVT 的桌面安装包（macOS + Windows）。
name: Build Desktop Packages On Tag

# 触发条件：仅在 tag push 时触发。
"on":
  push:
    tags:
      - "*"  # 任意 tag 都会触发，例如 v0.1.0。

# 需要写仓库内容权限，用于创建 Release 并上传附件。
permissions:
  contents: write

env:
  # macOS 构建 Python 版本。
  PYTHON_VERSION_MACOS: "3.13"
  # Windows 构建 Python 版本（PyInstaller + numpy/cv2 组合在 3.12 更稳定）。
  PYTHON_VERSION_WINDOWS: "3.12"
  # 固定 Flet 版本，确保命令行为可复现。
  FLET_VERSION: "0.80.5"
  # 应用名称。
  APP_NAME: "AutoVT"

jobs:
  build-macos:
    # macOS 构建任务（Apple Silicon）。
    name: Build macOS ARM64 (flet pack)
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      # 拉取当前 tag 对应源码。
      - name: Checkout Source
        uses: actions/checkout@v4

      # 安装 Python 3.13。
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_MACOS }}

      # 安装 uv。
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # 打印版本，便于排查环境问题。
      - name: Print Tool Versions
        run: |
          set -euxo pipefail
          python --version
          uv --version

      # 安装项目依赖（锁定版本）。
      - name: Install Dependencies
        run: |
          set -euxo pipefail
          uv sync --frozen --python "${PYTHON_VERSION_MACOS}"

      # 清理仓库中可能遗留的 spec，避免参数漂移导致打包不一致。
      - name: Clean Stale Spec
        run: |
          set -euxo pipefail
          rm -f "${APP_NAME}.spec"

      # 环境体检（失败不阻塞打包，避免 doctor 偶发问题导致整体失败）。
      - name: Run Flet Doctor
        continue-on-error: true
        run: |
          set -euxo pipefail
          uv run --python "${PYTHON_VERSION_MACOS}" --with "flet==${FLET_VERSION}" --with "flet-cli==${FLET_VERSION}" python -m flet_cli.cli doctor

      # 用 flet pack（PyInstaller）构建 macOS 应用。
      - name: Build macOS App
        run: |
          set -euxo pipefail
          uv run \
            --python "${PYTHON_VERSION_MACOS}" \
            --with "flet==${FLET_VERSION}" \
            --with "flet-cli==${FLET_VERSION}" \
            --with pyinstaller \
            python -m flet_cli.cli pack main.py \
            -n "${APP_NAME}" \
            -i assets/icon.icns \
            --add-data "assets:assets" \
            --add-data "images:images" \
            --add-data "adb:adb" \
            --yes -v

      # 打包 macOS 产物并生成 sha256。
      - name: Package macOS Artifact
        run: |
          set -euxo pipefail
          mkdir -p dist-release
          APP_PATH="dist/${APP_NAME}.app"
          if [ ! -d "${APP_PATH}" ]; then
            echo "未找到 macOS .app 产物：${APP_PATH}"
            find dist -maxdepth 4 -print || true
            exit 1
          fi
          ZIP_FILE="dist-release/${APP_NAME}-macos-arm64-${GITHUB_REF_NAME}.zip"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_FILE}"
          shasum -a 256 "${ZIP_FILE}" | tee "${ZIP_FILE}.sha256"

      # 上传 macOS 构建产物。
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autovt-macos-arm64-${{ github.ref_name }}
          path: |
            dist-release/*.zip
            dist-release/*.sha256

  build-windows:
    # Windows 构建任务（x64）。
    name: Build Windows x64 (flet pack)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      # 拉取当前 tag 对应源码。
      - name: Checkout Source
        uses: actions/checkout@v4

      # 安装 Python（Windows 固定 3.12，规避 PyInstaller + numpy/cv2 崩溃）。
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_WINDOWS }}

      # 安装 uv。
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # 打印版本，便于排查环境问题。
      - name: Print Tool Versions
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python --version
          uv --version

      # 安装项目依赖（锁定版本）。
      - name: Install Dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          uv sync --frozen --python "${env:PYTHON_VERSION_WINDOWS}"

      # 锁定 uv 运行时 Python：避免被仓库 .python-version(3.13) 覆盖成 3.13。
      - name: Pin UV Python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $uvPython = Join-Path $env:pythonLocation "python.exe"
          if (-not (Test-Path $uvPython)) {
            throw "未找到 setup-python 安装的解释器: $uvPython"
          }
          "UV_PYTHON=$uvPython" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Pinned UV_PYTHON=$uvPython"

      # 验证 uv 实际使用的解释器版本（应为 3.12）。
      - name: Verify UV Python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          uv run --python "$env:UV_PYTHON" python -c "import sys,platform; print(sys.version); print(sys.executable); print(platform.python_version())"

      # 清理仓库中可能遗留的 spec，避免参数漂移导致打包不一致。
      - name: Clean Stale Spec
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "$env:APP_NAME.spec") {
            Remove-Item "$env:APP_NAME.spec" -Force
          }

      # 环境体检（失败不阻塞打包，避免 doctor 偶发问题导致整体失败）。
      - name: Run Flet Doctor
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          uv run --python "$env:UV_PYTHON" --with "flet==${env:FLET_VERSION}" --with "flet-cli==${env:FLET_VERSION}" python -m flet_cli.cli doctor

      # 用 flet pack（PyInstaller）构建 Windows 应用。
      - name: Build Windows App
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $args = @(
            "--python", "$env:UV_PYTHON",
            "--with", "flet==$env:FLET_VERSION",
            "--with", "flet-cli==$env:FLET_VERSION",
            "--with", "pyinstaller",
            "python", "-m", "flet_cli.cli",
            "pack", "main.py",
            "-n", "$env:APP_NAME",
            "--add-data", "assets;assets",
            "--add-data", "images;images",
            "--add-data", "adb;adb",
            "--yes", "-v"
          )

          # Windows 图标优先使用 icon.ico，若不存在则跳过图标参数。
          if (Test-Path "assets/icon.ico") {
            $args += @("-i", "assets/icon.ico")
          } else {
            Write-Host "assets/icon.ico 不存在，跳过 Windows 图标参数"
          }

          uv run @args

      # 打包 Windows 产物并生成 sha256。
      - name: Package Windows Artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "dist-release" | Out-Null

          $exePath = "dist/$env:APP_NAME.exe"
          if (-not (Test-Path $exePath)) {
            Write-Host "未找到 Windows exe 产物：$exePath"
            Get-ChildItem -Recurse dist -ErrorAction SilentlyContinue | Select-Object FullName, Length
            throw "Windows 产物缺失"
          }

          $zipPath = "dist-release/$env:APP_NAME-windows-x64-$env:GITHUB_REF_NAME.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipPath -Force

          $sha = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLower()
          "$sha  $(Split-Path $zipPath -Leaf)" | Out-File "$zipPath.sha256" -Encoding ascii

      # 上传 Windows 构建产物。
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autovt-windows-x64-${{ github.ref_name }}
          path: |
            dist-release/*.zip
            dist-release/*.sha256

  release:
    # 汇总两个平台产物并创建 Release。
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      # 下载 macOS 构建产物。
      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: autovt-macos-arm64-${{ github.ref_name }}
          path: artifacts/macos

      # 下载 Windows 构建产物。
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: autovt-windows-x64-${{ github.ref_name }}
          path: artifacts/windows

      # 列出下载结果，便于排查路径问题。
      - name: List Downloaded Artifacts
        run: |
          set -euxo pipefail
          echo "macOS artifacts:"
          ls -lah artifacts/macos
          echo "windows artifacts:"
          ls -lah artifacts/windows

      # 创建 Release 并附加两个平台产物。
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/*.zip
            artifacts/macos/*.sha256
            artifacts/windows/*.zip
            artifacts/windows/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## AutoVT 桌面安装包（flet pack / PyInstaller）

            ### macOS ARM64
            - 下载 `AutoVT-macos-arm64-<tag>.zip`
            - 解压后得到 `AutoVT.app`

            ### Windows x64
            - 下载 `AutoVT-windows-x64-<tag>.zip`
            - 解压后得到 `AutoVT.exe`

            ### 说明
            - 首次打开若出现安全提示，请在系统设置里允许运行。
            - 如需校验完整性，可使用同名 `.sha256` 文件。
